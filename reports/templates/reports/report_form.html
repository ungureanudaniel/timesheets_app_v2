<!-- The Main Form (No changes needed to fields, just the ID) -->
<form method="post" id="report-form">
    {% csrf_token %}
    {{ form.as_p }}
    <!-- Hidden input for the signature -->
    <input type="hidden" name="signature_data" id="signature-data">
    
    <!-- Trigger Button -->
    <button type="button" class="btn btn-primary mt-4 w-100" id="trigger-signature">
        {% trans "Generate PDF Report" %}
    </button>
</form>

<!-- Modal Pop-up -->
<div id="sig-modal" style="display:none; position:fixed; z-index:9999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8);">
    <div style="background:white; margin:10% auto; padding:20px; width:90%; max-width:500px; border-radius:10px; text-align:center;">
        <h4>{% trans "Final Step: Please Sign" %}</h4>
        <p class="text-muted small">{% trans "Use your finger or mouse to sign below" %}</p>
        
        <canvas id="signature-pad" style="border:1px solid #ccc; background:#f9f9f9; width:100%; height:200px; touch-action: none;"></canvas>
        
        <div class="mt-3">
            <button type="button" class="btn btn-secondary" id="close-modal">{% trans "Cancel" %}</button>
            <button type="button" class="btn btn-outline-danger" id="clear-btn">{% trans "Clear" %}</button>
            <button type="button" class="btn btn-success" id="save-submit">{% trans "Sign & Export" %}</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
<script>
    const modal = document.getElementById("sig-modal");
    const canvas = document.getElementById("signature-pad");
    const signaturePad = new SignaturePad(canvas);

    // 1. Open Modal
    document.getElementById("trigger-signature").addEventListener("click", () => {
        modal.style.display = "block";
        resizeCanvas(); // Ensure canvas is scaled correctly
    });

    // 2. Close Modal
    document.getElementById("close-modal").addEventListener("click", () => {
        modal.style.display = "none";
    });

    // 3. Clear Pad
    document.getElementById("clear-btn").addEventListener("click", () => signaturePad.clear());

    // 4. Submit logic
    document.getElementById("save-submit").addEventListener("click", () => {
        if (signaturePad.isEmpty()) {
            alert("Please provide a signature.");
            return;
        }
        
        // Put signature in hidden input and submit form
        document.getElementById("signature-data").value = signaturePad.toDataURL();
        document.getElementById("report-form").submit();
    });

    function resizeCanvas() {
        const ratio = Math.max(window.devicePixelRatio || 1, 1);
        canvas.width = canvas.offsetWidth * ratio;
        canvas.height = canvas.offsetHeight * ratio;
        canvas.getContext("2d").scale(ratio, ratio);
        signaturePad.clear();
    }
</script>
